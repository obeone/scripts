name: "Build and Publish kdbg 🐍📦"

on:
  release:
    types:
      - published

jobs:
  build-and-publish:
    if: startsWith(github.event.release.tag_name, 'kdbg/')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kdbg
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: |
          python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          twine upload dist/*
